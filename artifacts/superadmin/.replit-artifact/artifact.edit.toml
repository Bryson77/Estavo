kind = "web"
previewPath = "/superadmin/"
title = "Estavo Superadmin"
version = "1.0.0"
id = "artifacts/superadmin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/superadmin/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/superadmin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/superadmin", "run", "build" ]
publicDir = "artifacts/superadmin/.next"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/superadmin/"
